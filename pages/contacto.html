<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <title>Contacto - PokeStore</title>
</head>
<body>
    <header>
        <div class="div-logo">
            <a class="logo" href="../index.html">PokeStore</a>
        </div>
        <nav class="header-nav">
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="./contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contacto">
            <h2>Contacto</h2>
            <p>¿Tenés alguna pregunta sobre nuestras cartas? ¡Escribinos!</p>
            <form action="https://formspree.io/f/xpqnyanz" method="POST">
                <label>
                    Tu nombre:
                    <input type="text" name="nombre" placeholder="Ej: Ash Ketchum" required>
                </label>
                <label>
                    Tu correo:
                    <input type="email" name="email" placeholder="Ej: ash@pokemon.com" required>
                </label>
                <label>
                    Tu mensaje:
                    <textarea name="message" placeholder="Escribí tu consulta acá..." required></textarea>
                </label>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 PokeStore. Todos los derechos reservados.</p>
        <nav>
            <ul>
                <li>
                    <img src="../img/Whatsapp.png" alt="whatsapp">
                </li>
                <li>
                    <img src="../img/Instagram.png" alt="instagram">
                </li>
            </ul>
        </nav>
    </footer>
</body>
</html>
